
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/resultdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=@Lodigoud25

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
management.tracing.sampling.probability=1.0
management.endpoints.web.exposure.include=*

# Resilience4j Circuit Breaker config
resilience4j.circuitbreaker.instances.attendanceService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.attendanceService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.attendanceService.sliding-window-size=5
